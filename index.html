<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ZeroG Element Tracker — Viewer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap');

body.theme-deepspace{--bg:#070b14;--bg2:#0d1220;--card:#0f1726;--border:#1a2840;--border2:#223050;--accent:#2979c8;--accent2:#5eb8ff;--ok:#3dffa0;--warn:#ffb84d;--err:#ff5f5f;--text:#ccdaee;--dim:#3d5070;--dim2:#5a7090;--new:#ffe066;--star:#ffffff;}
body.theme-solar{--bg:#0e0a00;--bg2:#1a1200;--card:#1f1600;--border:#2e2200;--border2:#3d3000;--accent:#c87800;--accent2:#ffb830;--ok:#a0ff60;--warn:#ff9020;--err:#ff5f5f;--text:#f0dfa0;--dim:#5a4a10;--dim2:#8a7030;--new:#60ffee;--star:#ffffc0;}
body.theme-nebula{--bg:#0d0714;--bg2:#140d20;--card:#170f26;--border:#2a1840;--border2:#3a2250;--accent:#8a29c8;--accent2:#c87eff;--ok:#ff7ef0;--warn:#ffb84d;--err:#ff5f5f;--text:#e0ccee;--dim:#503d70;--dim2:#7a5a90;--new:#ffe066;--star:#ffccff;}

:root{--mono:'Share Tech Mono',monospace;--sans:'Exo 2',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{color:var(--text);font-family:var(--sans);min-height:100vh;padding:28px 24px;position:relative;overflow-x:hidden;background:var(--bg);}

#starfield{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;border-radius:50%;background:var(--star);animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);}
@keyframes twinkle{0%,100%{opacity:var(--min-op,.1);transform:scale(1);}50%{opacity:var(--max-op,.8);transform:scale(1.2);}}
.star.shooting{width:2px!important;height:2px!important;animation:shoot var(--d,4s) linear infinite var(--delay,0s);opacity:0;}
@keyframes shoot{0%{opacity:0;transform:translate(0,0);}10%{opacity:1;}100%{opacity:0;transform:translate(calc(var(--dx)*1px),calc(var(--dy)*1px));}}

.header,.card,#planetSummary,.filters-bar,#resultsCard{position:relative;z-index:1;}.filters-bar{z-index:10;}

.header{margin-bottom:28px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.header-left h1{font-size:1.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent2);font-family:var(--mono);}
.header-left h1 span{color:var(--dim2);}
.header-meta{font-size:.75rem;color:var(--dim2);margin-top:5px;font-family:var(--mono);}
.header-meta .ok{color:var(--ok);}.header-meta .dim{color:var(--dim);}.header-meta .new{color:var(--new);}
.theme-switcher{display:flex;gap:6px;align-items:center;}
.theme-btn{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .15s;padding:0;}
.theme-btn:hover,.theme-btn.active{border-color:var(--accent2);transform:scale(1.2);}

.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:18px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);}

.tabs{display:flex;gap:0;margin-bottom:18px;border-bottom:1px solid var(--border);}
.tab-btn{padding:10px 20px;border:none;background:transparent;color:var(--dim2);cursor:pointer;font-family:var(--sans);font-weight:600;font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
.tab-btn:hover{color:var(--accent2);}.tab-btn.active{color:var(--accent2);border-bottom-color:var(--accent);}

label{display:block;font-size:.75rem;color:var(--dim2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;}
input[type=text],input[type=password],textarea,select{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:9px 12px;font-size:.85rem;font-family:var(--sans);outline:none;transition:border-color .2s;}
input:focus,textarea:focus,select:focus{border-color:var(--accent);}
.input-group{margin-bottom:14px;}

.btn{padding:9px 20px;border-radius:7px;border:none;font-size:.82rem;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .15s;font-family:var(--sans);}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.4);}
.btn-ghost{background:var(--bg2);color:var(--accent2);border:1px solid var(--border2);}
.btn-ghost:hover{border-color:var(--accent);}
.btn-danger{background:#2a1010;color:var(--err);border:1px solid #601e1e;}
.btn-danger:hover{background:#3a1515;}
.btn-sm{padding:7px 13px;font-size:.75rem;}

.warn-box{border-radius:6px;padding:9px 13px;font-size:.78rem;margin-bottom:14px;}
.log-box{margin-top:12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 14px;max-height:130px;overflow-y:auto;font-family:var(--mono);font-size:.72rem;}
.log-line{margin-bottom:3px;}
.log-ok{color:var(--ok);}.log-err{color:var(--err);}.log-info{color:var(--dim2);}

.drop-zone{border:2px dashed var(--border2);border-radius:8px;padding:36px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:14px;}
.drop-zone:hover,.drop-zone.over{border-color:var(--accent);background:var(--border);}
.drop-zone .icon{font-size:2.2rem;margin-bottom:8px;}
.drop-zone p{color:var(--dim2);font-size:.85rem;}.drop-zone small{color:var(--dim);font-size:.73rem;}

.filters-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
.filters-bar select{width:auto;min-width:140px;}
.filters-bar .spacer{flex:1;}

.rarity-filter{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.rarity-check{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);cursor:pointer;user-select:none;transition:all .15s;font-size:.78rem;font-weight:600;opacity:.45;}
.rarity-check:hover{border-color:var(--accent);}
.rarity-check.on{opacity:1;}
.rarity-check.on.rc-common{background:#0d200d;border-color:#2a6a2a;color:#7aff7a;}
.rarity-check.on.rc-uncommon{background:#0d1a2a;border-color:#1a4a8a;color:#60c8ff;}
.rarity-check.on.rc-rare{background:#1a0d2a;border-color:#5a1a8a;color:#c87eff;}
.rarity-check.on.rc-epic{background:#2a1a0d;border-color:#8a5a1a;color:#ffb84d;}
.rarity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

.el-search-wrap{position:relative;min-width:200px;}
.el-search-wrap input{padding-right:28px;}
.el-search-wrap .clear-x{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dim2);cursor:pointer;font-size:1rem;line-height:1;padding:0;}
.el-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border2);border-radius:6px;max-height:200px;overflow-y:auto;z-index:1000;display:none;}
.el-dropdown.open{display:block;}
.el-dropdown-item{padding:7px 12px;cursor:pointer;font-size:.82rem;display:flex;align-items:center;gap:8px;}
.el-dropdown-item:hover{background:var(--border);}

#planetSummary{margin-bottom:18px;position:relative;z-index:1;}
.summary-heading{font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;color:var(--dim2);font-family:var(--mono);margin-bottom:12px;}
.planet-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.planet-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;transition:border-color .15s;}
.planet-card.has-results:hover{border-color:var(--border2);}
.planet-card.no-results{opacity:.4;}
.planet-card-header{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;}
.planet-card-name{font-weight:700;color:var(--accent2);font-size:.85rem;}
.planet-card-meta{font-size:.68rem;color:var(--dim2);font-family:var(--mono);}
.planet-card-right{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.planet-badge{padding:2px 7px;border-radius:10px;font-size:.68rem;font-weight:700;font-family:var(--mono);}
.badge-new{background:rgba(255,224,102,.1);border:1px solid rgba(255,224,102,.4);color:var(--new);}
.badge-rare{background:rgba(180,80,255,.1);border:1px solid rgba(180,80,255,.35);color:#c87eff;}
.badge-epic{background:rgba(255,140,40,.1);border:1px solid rgba(255,140,40,.35);color:#ffb84d;}
.planet-card-pills{display:flex;flex-wrap:wrap;gap:3px;}
.planet-card-empty{font-size:.72rem;color:var(--dim);font-family:var(--mono);font-style:italic;}
.rarity-breakdown{display:flex;flex-direction:column;gap:3px;margin-top:7px;}
.rb-row{display:flex;align-items:center;gap:6px;}
.rb-row.rb-dimmed{opacity:.22;}
.rb-label{width:56px;font-size:.64rem;text-transform:uppercase;letter-spacing:.05em;font-family:var(--mono);}
.rb-label-common{color:#7aff7a;}.rb-label-uncommon{color:#60c8ff;}.rb-label-rare{color:#c87eff;}.rb-label-epic{color:#ffb84d;}
.rb-count{font-weight:700;font-size:.78rem;min-width:14px;text-align:right;font-family:var(--mono);}
.rb-count-common{color:#7aff7a;}.rb-count-uncommon{color:#60c8ff;}.rb-count-rare{color:#c87eff;}.rb-count-epic{color:#ffb84d;}
.rb-bar-wrap{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.rb-bar{height:100%;border-radius:2px;transition:width .25s;}
.rb-bar-common{background:#7aff7a;}.rb-bar-uncommon{background:#60c8ff;}.rb-bar-rare{background:#c87eff;}.rb-bar-epic{background:#ffb84d;}
.planet-card-meta-active{font-size:.68rem;color:var(--ok);font-family:var(--mono);}
.planet-card-meta-total{font-size:.68rem;color:var(--dim2);font-family:var(--mono);}

.result-tabs{display:flex;border-bottom:1px solid var(--border);}
.result-tab{padding:12px 22px;border:none;background:transparent;cursor:pointer;font-family:var(--sans);font-weight:700;font-size:.8rem;text-transform:uppercase;letter-spacing:.07em;color:var(--dim2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
.result-tab:hover{color:var(--accent2);}.result-tab.active{color:var(--accent2);border-bottom-color:var(--accent);}
.result-tab .count{display:inline-block;padding:1px 7px;border-radius:10px;font-size:.7rem;font-weight:700;margin-left:6px;background:var(--bg2);border:1px solid var(--border2);color:var(--accent2);}
.result-tab.active .count{background:var(--border);}

.table-wrap{overflow-x:auto;overflow-y:auto;max-height:520px;}
table{width:100%;border-collapse:collapse;font-size:.88rem;}
thead tr{background:var(--bg2);}
thead th{position:sticky;top:0;z-index:2;background:var(--bg2);}
th{padding:10px 12px;text-align:left;color:var(--accent);font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--border);font-family:var(--mono);}
td{padding:11px 13px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:hover td{background:rgba(255,255,255,.02);}
tr.fully-mined-row td{opacity:.35;}
tr.new-row td{background:rgba(255,224,102,.03);}
tr.new-row td:first-child{border-left:2px solid var(--new);}
.planet-name{color:var(--accent2);font-weight:700;}
.planet-id{font-size:.7rem;color:var(--dim);font-family:var(--mono);}
.site-name{font-family:var(--sans);font-size:.82rem;color:#e8eaf0;font-weight:600;}
.new-badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:.65rem;font-weight:700;background:rgba(255,224,102,.15);border:1px solid rgba(255,224,102,.5);color:var(--new);margin-left:6px;vertical-align:middle;font-family:var(--mono);}

.pill{display:inline-block;padding:2px 8px;margin:2px;border-radius:12px;font-size:.72rem;font-weight:700;font-family:var(--mono);cursor:pointer;transition:all .12s;}
.pill:hover{transform:scale(1.05);}
.pill.el-mined{text-decoration:line-through;opacity:.3;}
.pill-common{background:rgba(100,220,100,.1);border:1px solid rgba(100,220,100,.3);color:#7aff7a;}
.pill-uncommon{background:rgba(60,160,255,.1);border:1px solid rgba(60,160,255,.3);color:#60c8ff;}
.pill-rare{background:rgba(180,80,255,.1);border:1px solid rgba(180,80,255,.3);color:#c87eff;}
.pill-epic{background:rgba(255,140,40,.1);border:1px solid rgba(255,140,40,.3);color:#ffb84d;}
.pill-glow{animation:pillglow 2s ease-in-out infinite;}
@keyframes pillglow{0%,100%{box-shadow:0 0 5px currentColor,0 0 10px currentColor;}50%{box-shadow:0 0 10px currentColor,0 0 20px currentColor,0 0 30px currentColor;}}

.date-cell{font-size:.72rem;color:var(--dim2);font-family:var(--mono);white-space:nowrap;}
.action-btn{padding:5px 11px;border-radius:5px;cursor:pointer;font-size:.75rem;font-weight:700;border:1px solid;transition:all .12s;font-family:var(--sans);}
.action-del{border-color:#601e1e;background:#2a1010;color:var(--err);}.action-empty{border-color:#3a4a1a;background:#1a2010;color:var(--ok);margin:1px;}
.action-del:hover{background:#3a1515;}

.empty{text-align:center;padding:56px 20px;color:var(--dim);}
.empty .icon{font-size:3rem;margin-bottom:14px;}
.empty p{font-size:.9rem;color:var(--dim2);}
.console-script-area{width:100%;height:200px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--accent2);padding:12px;font-family:var(--mono);font-size:.72rem;resize:vertical;}
.copy-strip{display:flex;justify-content:flex-end;margin-top:8px;}
.result-stats{margin-left:auto;display:flex;align-items:center;gap:8px;padding-right:16px;flex-shrink:0;}
.rstat{display:flex;align-items:baseline;gap:4px;}
.rstat-num{font-weight:700;font-family:var(--sans);font-size:.92rem;}
.rstat-label{font-size:.74rem;color:var(--text);text-transform:uppercase;letter-spacing:.05em;opacity:.7;}
.rstat-sep{color:var(--border2);font-size:.75rem;}
.stat-active{color:var(--ok);}
.stat-sectors{color:var(--accent2);}
.stat-low{color:var(--warn);}
.stat-empty{color:var(--dim2);}
.stat-mined{color:var(--err);}
::-webkit-scrollbar{width:6px;height:6px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

#stickyBar{position:sticky;top:0;z-index:50;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:8px 16px;margin-bottom:14px;display:none;flex-wrap:wrap;gap:8px 14px;align-items:center;backdrop-filter:blur(8px);}
.sbar-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--dim2);font-family:var(--mono);margin-right:2px;}
.sbar-group{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.sbar-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:.72rem;font-weight:700;font-family:var(--mono);}
.sbar-pill-rare{background:rgba(180,80,255,.12);border:1px solid rgba(180,80,255,.35);color:#c87eff;}
.sbar-pill-epic{background:rgba(255,140,40,.12);border:1px solid rgba(255,140,40,.35);color:#ffb84d;}
.sbar-sep{color:var(--border2);font-size:.8rem;}
.sbar-count{font-size:.82rem;font-weight:700;font-family:var(--mono);}
.sbar-count.epic-c{color:var(--warn);}
.sbar-count.rare-c{color:#c87eff;}
th.sortable{cursor:pointer;user-select:none;white-space:nowrap;}
th.sortable:hover{color:var(--accent2);}
th.sort-asc::after{content:' \25B2';font-size:.6rem;opacity:.8;}
th.sort-desc::after{content:' \25BC';font-size:.6rem;opacity:.8;}
tr.row-has-epic td:first-child{border-left:2px solid rgba(255,140,40,.6);}
tr.row-has-rare td:first-child{border-left:2px solid rgba(180,80,255,.4);}
tr.row-has-epic{background:rgba(255,140,40,.025);}
tr.planet-group-header td{background:var(--bg2);padding:6px 13px;font-size:.72rem;font-family:var(--mono);color:var(--dim2);border-bottom:none;cursor:pointer;user-select:none;}
tr.planet-group-header:hover td{background:var(--border);}
tr.planet-group-header td .pgh-name{color:var(--accent2);font-weight:700;font-size:.82rem;}
tr.planet-group-header td .pgh-meta{margin-left:10px;color:var(--dim2);}
tr.planet-group-header .collapse-icon{float:right;transition:transform .2s;}
tr.planet-group-header.collapsed .collapse-icon{transform:rotate(-90deg);}
.pill .el-fullname{font-size:.6rem;font-weight:400;opacity:.9;font-family:var(--sans);color:#c8d0e8;}
.pill-grid{display:flex;flex-wrap:wrap;gap:3px;max-width:340px;}
.el-col-row{white-space:nowrap;height:26px;display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,.07);transition:background .1s;}.el-col-row:last-child{border-bottom:none;}.el-col-row.el-row-hover{background:rgba(255,255,255,.07);border-radius:3px;}
.el-col-pill{min-width:150px;vertical-align:top;}
.el-col-qty-td{font-family:var(--sans);font-size:.82rem;font-weight:600;padding-left:20px!important;white-space:nowrap;vertical-align:top;}
.el-col-qty{}
.el-col-unc-td{white-space:nowrap;vertical-align:top;}
.el-col-gc-td{white-space:nowrap;vertical-align:top;}
.view-toggle{display:flex;gap:4px;border:1px solid var(--border2);border-radius:6px;overflow:hidden;}
.vt-btn{padding:5px 10px;border:none;background:transparent;color:var(--dim2);cursor:pointer;font-size:.72rem;font-family:var(--mono);transition:all .12s;}
.vt-btn.active{background:var(--border2);color:var(--accent2);}
.vt-btn:hover{color:var(--accent2);}
.action-mine-all{border-color:#1a3a4a!important;background:#0a1a2a!important;color:var(--accent2)!important;margin:1px;}
.action-mine-all:hover{background:#0d2a3a!important;}
.actions-cell{white-space:nowrap;}
.note-display{font-size:.72rem;color:var(--dim2);font-style:italic;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;display:block;}
.note-display:hover{color:var(--accent2);}
.note-display.empty-note{color:var(--dim);opacity:.45;}
.note-input{width:100%;min-width:110px;background:var(--bg2);border:1px solid var(--accent);border-radius:4px;color:var(--text);padding:4px 8px;font-size:.72rem;font-family:var(--sans);outline:none;}
.dep-row{display:flex;align-items:center;gap:5px;margin-bottom:2px;white-space:nowrap;}
.dep-qty{font-weight:600;font-family:var(--sans);font-size:.82rem;}
.dep-size{font-size:.78rem;font-family:var(--sans);font-weight:600;text-transform:capitalize;}
.paste-area{width:100%;height:110px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:10px 13px;font-size:.77rem;font-family:var(--mono);outline:none;resize:vertical;transition:border-color .2s;}
.paste-area:focus{border-color:var(--accent);}
.paste-note{font-size:.72rem;color:var(--dim);margin-bottom:6px;}
.history-list{max-height:160px;overflow-y:auto;margin-top:10px;}
.history-item{display:flex;align-items:center;flex-wrap:wrap;gap:4px;padding:6px 10px;border-radius:5px;background:var(--bg2);border:1px solid var(--border);margin-bottom:5px;font-size:.74rem;font-family:var(--mono);}
.hi-time{color:var(--dim2);margin-left:auto;}
.hi-count{color:var(--ok);font-weight:700;}
.hi-label{color:var(--accent2);}

.price-cell{min-width:90px;}
.price-row{display:flex;align-items:center;gap:5px;margin-bottom:2px;white-space:nowrap;}
.price-unc{font-family:var(--sans);font-size:.82rem;font-weight:600;}
.price-gc{font-family:var(--sans);font-size:.82rem;font-weight:600;}
.rc-common{color:#7aff7a;}.rc-uncommon{color:#60c8ff;}.rc-rare{color:#c87eff;}.rc-epic{color:#ffb84d;}
.price-label{font-size:.65rem;font-family:var(--sans);opacity:.75;text-transform:uppercase;letter-spacing:.04em;color:#a0a8c0;}
</style>
</head>
<body class="theme-deepspace">
<div id="starfield"></div>

<div class="header">
  <div class="header-left">
    <h1>⚗ <span>//</span> ZeroG Element Tracker</h1>
    <div class="header-meta" id="headerMeta">No data yet &nbsp;·&nbsp; <span class="ok">0 active</span> &nbsp;·&nbsp; <span class="dim">0 mined</span></div>
  </div>
  <div class="theme-switcher">
    <span style="font-size:.7rem;color:var(--dim2);font-family:var(--mono);margin-right:4px">THEME</span>
    <button class="theme-btn active" id="btn-deepspace" style="background:linear-gradient(135deg,#070b14,#2979c8)" onclick="setTheme('deepspace')" title="Deep Space"></button>

async function loadSharedData(){
  if(!SHARE_URL){refreshUI();return;}
  try{
    const r=await fetch(SHARE_URL+'?t='+Date.now());
    if(!r.ok){refreshUI();return;}
    const data=await r.json();
    if(!data.sites||!data.sites.length){refreshUI();return;}
    store.sites=data.sites;
    store.lastScan=data.lastScan||null;
    store.prevScanIds=data.newSiteIds?.length
      ? store.sites.filter(s=>!data.newSiteIds.includes(s.id)).map(s=>s.id)
      : [];
    const banner=document.createElement('div');
    banner.style.cssText='background:#0d1a0d;border:1px solid #2a6a2a;border-radius:8px;padding:10px 16px;margin-bottom:16px;font-size:.8rem;color:#7aff7a;font-family:var(--mono);position:relative;z-index:1;';

    refreshUI();

}

function buildStarfield(){

  for(let i=0;i<5;i++){const s=document.createElement('div');s.className='star shooting';const angle=Math.random()*40+10,dist=200+Math.random()*300;s.style.cssText=`left:${Math.random()*80}%;top:${Math.random()*60}%;--d:${6+Math.random()*8}s;--delay:${-(Math.random()*10)}s;--dx:${Math.cos(angle*Math.PI/180)*dist};--dy:${Math.sin(angle*Math.PI/180)*dist};`;sf.appendChild(s);}
}

function getSectorStatus(site,el){
  if(site.minedElements&&site.minedElements.includes(el))return'empty';
  const dep=site.depositData&&site.depositData[el];
  if(dep&&dep.qty===0)return'empty';
  // Epics never go low — always considered active regardless of quantity
  const r=getRarity(el);
  if(r==='epic')return'active';
  const LOW_THRESHOLD={rare:150,uncommon:300,common:500};
  if(dep&&dep.qty<(LOW_THRESHOLD[r]||150))return'low';
  return'active';
}
function isElEffectivelyDone(site,el){return getSectorStatus(site,el)!=='active';}
function isFullyMined(site){if(!site.allElements.length)return false;return site.allElements.every(e=>isElEffectivelyDone(site,e));}
function isElMined(site,el){return site.minedElements&&site.minedElements.includes(el);}
function toggleElementMined(siteId,el){const site=store.sites.find(s=>s.id===siteId);if(!site)return;if(!site.minedElements)site.minedElements=[];if(site.minedElements.includes(el))site.minedElements=site.minedElements.filter(x=>x!==el);else site.minedElements.push(el);saveStore();refreshUI();}

function markAllMined(siteId){
  const site=store.sites.find(s=>s.id===siteId);if(!site)return;
  if(!site.minedElements)site.minedElements=[];
  site.allElements.filter(e=>getSectorStatus(site,e)==='active').forEach(e=>{if(!site.minedElements.includes(e))site.minedElements.push(e);});
  saveStore();refreshUI();
}
function unmarkAllMined(siteId){const site=store.sites.find(s=>s.id===siteId);if(!site)return;site.minedElements=[];saveStore();refreshUI();}
function deleteSite(id){store.sites=store.sites.filter(x=>x.id!==id);saveStore();refreshUI();}
function clearAll(){if(!confirm('Clear all tracked sites?'))return;store={sites:[],lastScan:null,prevScanIds:[],theme:store.theme,importHistory:store.importHistory};saveStore();refreshUI();}
function isNew(site){if(!store.prevScanIds?.length)return false;return!store.prevScanIds.includes(site.id);}

function openElDropdown(q){
  const dd=document.getElementById('elDropdown');
  const allEls=[...new Set(store.sites.flatMap(s=>s.allElements))].sort((a,b)=>(ELEMENT_NAMES[a]||a).localeCompare(ELEMENT_NAMES[b]||b));
  const query=q||document.getElementById('elSearch').value.toLowerCase().trim();
  const filtered=allEls.filter(sym=>{if(!query)return true;const name=(ELEMENT_NAMES[sym]||'').toLowerCase();return sym.toLowerCase().includes(query)||name.includes(query);}).slice(0,query?20:200);
  if(!filtered.length){dd.classList.remove('open');return;}

}

function importCsv(text,source,logBoxId){
  const box=logBoxId||'importLog';document.getElementById(box).innerHTML='';
  const lines=text.trim().split('\n');
  if(lines.length<2){log(box,'No data rows.','err');return;}
  const headers=lines[0].split(',').map(h=>h.replace(/"/g,'').trim().toLowerCase());
  const sites=[];
  for(let i=1;i<lines.length;i++){
    const vals=[];let cur='',inQ=false;
    for(let ci=0;ci<lines[i].length;ci++){const ch=lines[i][ci];if(ch==='"'){if(inQ&&lines[i][ci+1]==='"'){cur+='"';ci++;}else inQ=!inQ;}else if(ch===','&&!inQ){vals.push(cur.trim());cur='';}else cur+=ch;}
    vals.push(cur.trim());
    const obj={};headers.forEach((h,j)=>obj[h]=vals[j]||'');
    const pname=obj['planet name']||obj['planetname']||'';if(!pname)continue;
    const pid=obj['planet id']||obj['planetid']||'';const sname=obj['site name']||obj['sitename']||'';
    const allEls=(obj['all elements']||obj['allelements']||obj['elements']||'').split(';').filter(Boolean);
    let depositData={};try{const raw=obj['deposit data']||obj['depositdata']||'';if(raw)depositData=JSON.parse(raw);}catch(e){}
    sites.push({id:pid+'_'+sname+'_imp'+i,planetId:pid,planetName:pname,siteName:sname,allElements:allEls,depositData,minedElements:[],foundAt:obj['found at']||obj['foundat']||new Date().toISOString(),source:source||'csv'});
  }
  const added=mergeSites(sites);saveStore();addImportHistory(source||'CSV file',sites.length,added);
  log(box,'Imported '+sites.length+' rows, '+added+' new sites added.','ok');refreshUI();
}

function mergeSites(ns){
  const keys=new Set(store.sites.map(s=>s.planetId+'_'+s.siteName));let added=0;
  for(const s of ns){
    const k=s.planetId+'_'+s.siteName;
    if(!keys.has(k)){if(!s.minedElements)s.minedElements=[];if(!s.depositData)s.depositData={};store.sites.push(s);keys.add(k);added++;}
    else{const ex=store.sites.find(x=>x.planetId+'_'+x.siteName===k);if(ex){ex.allElements=s.allElements;if(s.depositData&&Object.keys(s.depositData).length)ex.depositData=s.depositData;}}
  }
  return added;
}


function exportCsv(){
  const rows=[['Planet ID','Planet Name','Site Name','All Elements','Deposit Data','Mined Elements','Notes','Found At']];
  store.sites.forEach(s=>rows.push([s.planetId,s.planetName,s.siteName,s.allElements.join(';'),JSON.stringify(s.depositData||{}),(s.minedElements||[]).join(';'),s.note||'',s.foundAt||'']));
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');

}

function refreshUI(){updateHeader();updateStatsBar();updateFilters();renderPlanetSummary();renderTable();renderHistory();updateStickyBar();}

function calcStats(){
  const all=store.sites;let activeQ=0,activeSectors=0,lowSectors=0,emptySectors=0,fullyMined=0;
  for(const s of all){const vis=s.allElements.filter(e=>activeRarities.has(getRarity(e)));let sA=0,sL=0,sE=0;for(const e of vis){const st=getSectorStatus(s,e);if(st==='active')sA++;else if(st==='low')sL++;else sE++;}activeSectors+=sA;lowSectors+=sL;emptySectors+=sE;if(sA>0)activeQ++;else fullyMined++;}
  return{activeQ,activeSectors,lowSectors,emptySectors,fullyMined};
}
function updateStatsBar(){
  const has=store.sites.length>0;const bar=document.getElementById('statsBar');if(!has){bar.style.display='none';return;}bar.style.display='';
  const s=calcStats();['statActive','statSectors','statLow','statMined'].forEach((id,i)=>{document.getElementById(id).textContent=[s.activeQ,s.activeSectors,s.lowSectors,s.fullyMined][i].toLocaleString();});
}
function updateHeader(){
  const active=store.sites.filter(s=>!isFullyMined(s)).length,mined=store.sites.filter(s=>isFullyMined(s)).length,newCount=store.sites.filter(s=>isNew(s)&&!isFullyMined(s)).length;
  const glows=getGlowSet();const foundGlow=[...new Set(store.sites.filter(s=>!isFullyMined(s)).flatMap(s=>s.allElements.filter(e=>glows.has(e)&&!isElMined(s,e))))];
  const last=store.lastScan?'Last scan: '+new Date(store.lastScan).toLocaleString():'No data yet';
  document.getElementById('headerMeta').innerHTML=last+' &nbsp;&middot;&nbsp; <span class="ok">'+active+' active</span>'+(newCount>0?' &nbsp;&middot;&nbsp; <span class="new">'+newCount+' new \u2736</span>':'')+' &nbsp;&middot;&nbsp; <span class="dim">'+mined+' fully mined</span>'+(foundGlow.length>0?' &nbsp;&middot;&nbsp; <span style="color:var(--warn)">\u26a1 '+foundGlow.join(', ')+'</span>':'');
}

function updateStickyBar(){

  const rares=[...new Set(activeSites.flatMap(s=>s.allElements.filter(e=>getRarity(e)==='rare'&&getSectorStatus(s,e)==='active')))].sort();

  document.getElementById('sbarEpicPills').innerHTML=epics.slice(0,14).map(e=>'<span class="sbar-pill sbar-pill-epic" title="'+(ELEMENT_NAMES[e]||e)+'">'+e+'</span>').join('');
  const sep=document.getElementById('sbarRareSep');if(sep)sep.style.display=(epics.length&&rares.length)?'':'none';

}

function updateFilters(){
  const has=store.sites.length>0;document.getElementById('filtersBar').style.display=has?'':'none';document.getElementById('resultsCard').style.display=has?'':'none';
  if(!has){document.getElementById('planetSummary').style.display='none';return;}

  pSel.value=curP;

function renderPlanetSummary(){
  if(!store.sites.length){document.getElementById('planetSummary').style.display='none';return;}
  document.getElementById('planetSummary').style.display='';
  const byName={};for(const s of store.sites){if(!byName[s.planetName])byName[s.planetName]={sites:[]};byName[s.planetName].sites.push(s);}
  const knownNames=new Set(ALL_PLANETS.map(p=>p.name));
  const extraPlanets=Object.keys(byName).filter(n=>!knownNames.has(n)).map(n=>({name:n,id:byName[n].sites[0]?.planetId}));
  const allPlanets=[...ALL_PLANETS,...extraPlanets];
  const TIERS=['epic','rare','uncommon','common'];
  const TIER_ORDER={epic:3,rare:2,uncommon:1,common:0};

  const scored=allPlanets.map(p=>{
    const data=byName[p.name];const sites=data?data.sites:[];
    const newSites=sites.filter(s=>isNew(s)&&!isFullyMined(s));
    // Count unique active/total elements per rarity tier across all sites on this planet
    const tierActive={epic:new Set(),rare:new Set(),uncommon:new Set(),common:new Set()};
    const tierTotal={epic:new Set(),rare:new Set(),uncommon:new Set(),common:new Set()};
    for(const s of sites){
      for(const e of s.allElements){
        const r=getRarity(e);
        tierTotal[r].add(e);
        if(getSectorStatus(s,e)==='active')tierActive[r].add(e);
      }
    }
    // Active site count respects current rarity filter (mirrors getFiltered logic)
    const activeSiteCount=sites.filter(s=>{
      const all=s.allElements;
      const siteTiers=all.map(e=>getRarity(e)).filter(r=>activeRarities.has(r));
      if(!siteTiers.length)return false;
      const siteHighest=siteTiers.reduce((best,r)=>TIER_ORDER[r]>TIER_ORDER[best]?r:best,'common');
      return all.filter(e=>getRarity(e)===siteHighest&&activeRarities.has(getRarity(e))).some(e=>getSectorStatus(s,e)==='active');
    }).length;
    const epicCount=tierActive.epic.size,rareCount=tierActive.rare.size;
    return{...p,sites,newSites,tierActive,tierTotal,activeSiteCount,epicCount,rareCount,score:epicCount*10+rareCount};
  });

  scored.sort((a,b)=>{const aH=a.sites.length>0,bH=b.sites.length>0;if(aH&&!bH)return -1;if(!aH&&bH)return 1;if(aH&&bH&&b.score!==a.score)return b.score-a.score;return a.name.localeCompare(b.name);});

  document.getElementById('planetCards').innerHTML=scored.map(p=>{
    const hasResults=p.sites.length>0;
    let breakdownHtml='';
    if(hasResults){
      const rows=TIERS.filter(r=>p.tierTotal[r].size>0).map(r=>{
        const active=p.tierActive[r].size,total=p.tierTotal[r].size;
        const dimmed=!activeRarities.has(r);
        // Bar shows active/total ratio for this planet only — 100% = all elements active
        const pct=total>0?Math.round((active/total)*100):0;
        return'<div class="rb-row'+(dimmed?' rb-dimmed':'')+'">'+
          '<span class="rb-label rb-label-'+r+'">'+r+'</span>'+
          '<span class="rb-count rb-count-'+r+'">'+active+'</span>'+
          '<span style="color:var(--dim2);font-size:.62rem">/'+total+'</span>'+
          '<div class="rb-bar-wrap"><div class="rb-bar rb-bar-'+r+'" style="width:'+pct+'%"></div></div>'+
        '</div>';
      });
      breakdownHtml=rows.length?'<div class="rarity-breakdown">'+rows.join('')+'</div>':'<div class="planet-card-empty">no matching elements</div>';
    } else {
      breakdownHtml='<div class="planet-card-empty">not yet scanned</div>';
    }
    const sitesMeta=hasResults
      ?'<span class="planet-card-meta-active">'+p.activeSiteCount+' active</span> <span class="planet-card-meta-total">/ '+p.sites.length+'</span>'
      :'no data';
        return'<div class="planet-card '+(hasResults?'has-results':'no-results')+'" '+(hasResults?'onclick="filterByPlanet(\''+p.name+'\')" style="cursor:pointer"':'')+'>'+
      '<div class="planet-card-header"><div><div class="planet-card-name">'+p.name+'</div><div class="planet-card-meta">'+sitesMeta+'</div></div>'+
      '<div class="planet-card-right">'+
        (p.newSites.length?'<span class="planet-badge badge-new">'+p.newSites.length+'✶</span>':'')+
        (p.epicCount?'<span class="planet-badge badge-epic">'+p.epicCount+' epic</span>':'')+
        (p.rareCount?'<span class="planet-badge badge-rare">'+p.rareCount+' rare</span>':'')+
      '</div></div>'+
      breakdownHtml+
    '</div>';
  }).join('');
}

function getFiltered(tab){
  const fp=document.getElementById('filterPlanet')?.value||'';
  return store.sites.filter(s=>{
    if(fp&&s.planetName!==fp)return false;
    if(elSearchFilter&&!s.allElements.includes(elSearchFilter))return false;
    if(showNewOnly&&!isNew(s))return false;
    const visible=s.allElements.filter(e=>activeRarities.has(getRarity(e))&&(!gcFilterOn||(e in PRICE_GC)));
    if(!visible.length)return false;
    if(tab==='active') return visible.some(e=>getSectorStatus(s,e)==='active');
    return visible.some(e=>getSectorStatus(s,e)!=='active');
  });
}

const SIZE_ORDER={huge:0,large:1,medium:2,small:3,'':4};
function applySort(rows){
  const {col,dir}=currentSort;if(!col)return rows;const mul=dir==='asc'?1:-1;
  function visEls(s){
    return s.allElements.filter(e=>{
      if(!activeRarities.has(getRarity(e)))return false;
      if(gcFilterOn&&!(e in PRICE_GC))return false;
      const st=getSectorStatus(s,e);
      if(currentResultTab==='active')return st==='active';
      return st!=='active';
    });
  }
  return [...rows].sort((a,b)=>{
    if(col==='planet')return mul*a.planetName.localeCompare(b.planetName);
    if(col==='site')return mul*a.siteName.localeCompare(b.siteName);
    if(col==='qty'){
      const qa=Math.max(0,...visEls(a).map(e=>(a.depositData&&a.depositData[e])?a.depositData[e].qty:0));
      const qb=Math.max(0,...visEls(b).map(e=>(b.depositData&&b.depositData[e])?b.depositData[e].qty:0));
      return mul*(qb-qa);
    }
    if(col==='unc'){
      const pa=Math.max(0,...visEls(a).map(e=>PRICE_UNC[e]||0));
      const pb=Math.max(0,...visEls(b).map(e=>PRICE_UNC[e]||0));
      return mul*(pb-pa);
    }
    if(col==='gc'){
      const pa=Math.max(0,...visEls(a).map(e=>PRICE_GC[e]||0));
      const pb=Math.max(0,...visEls(b).map(e=>PRICE_GC[e]||0));
      return mul*(pb-pa);
    }
    return 0;
  });
}

function renderTable(){
  const active=getFiltered('active'),done=getFiltered('done');
  document.getElementById('countActive').textContent=active.length;document.getElementById('countDone').textContent=done.length;
  const rows=currentResultTab==='active'?active:done;
  const tbody=document.getElementById('resultsBody'),empty=document.getElementById('emptyState');
  if(!rows.length){tbody.innerHTML='';empty.style.display='';return;}empty.style.display='none';
  const sizeCol={small:'var(--dim2)',medium:'var(--accent2)',large:'var(--ok)',huge:'var(--warn)'};
  if(viewMode==='grouped')renderGrouped(rows,tbody,sizeCol);else renderFlat(rows,tbody,sizeCol);
}

function buildRowHtml(s,sizeCol){
  const visEls=s.allElements.filter(e=>activeRarities.has(getRarity(e)));
  const pillEls=visEls.filter(e=>{const st=getSectorStatus(s,e);if(currentResultTab==='active')return st==='active';return st!=='active';})
    .sort((a,b)=>{
      const col=currentSort.col;
      if(col==='unc')return (PRICE_UNC[b]||0)-(PRICE_UNC[a]||0);
      if(col==='gc')return (PRICE_GC[b]||0)-(PRICE_GC[a]||0);
      const qa=(s.depositData&&s.depositData[a]&&s.depositData[a].qty!=null)?s.depositData[a].qty:-1;
      const qb=(s.depositData&&s.depositData[b]&&s.depositData[b].qty!=null)?s.depositData[b].qty:-1;
      return qb-qa;
    });
  const deps=s.depositData||{};
  const LOW_T={rare:150,uncommon:300,common:500};
  // Price colour bands (bottom/mid/top third per rarity)
  const PRICE_BANDS={
    epic: [2250,3835], rare: [275,358.5], uncommon: [38.5,57], common: [5,7]
  };
  function priceColor(sym){
    const r=getRarity(sym),p=PRICE_UNC[sym],b=PRICE_BANDS[r];
    if(p==null||!b)return'#e8eaf0';
    if(p<b[0])return'#ff6b6b';
    if(p<b[1])return'#ffb84d';
    return'#6bffb8';
  }
  function qtyColor(qty){
    if(qty==null)return'var(--dim)';
    if(qty===0)return'#ff6b6b';
    if(qty<=500)return'#ff6b6b';
    if(qty<=2500)return'#ffb84d';
    return'#6bffb8';
  }
  const elData=pillEls.map(e=>{
    const m=isElMined(s,e),fn=ELEMENT_NAMES[e]||e;
    const dep=deps[e];
    const qty=dep&&dep.qty!=null?Number(dep.qty).toLocaleString():'—';
    const qtyCol=dep?qtyColor(dep.qty):'var(--dim)';
    const pc=priceColor(e);
    const unc=PRICE_UNC[e]!=null?'<span style="color:'+pc+';font-weight:600">'+PRICE_UNC[e].toLocaleString()+'</span><span class="price-label"> UNc</span>':'<span style="color:var(--dim)">—</span>';
    const gc=PRICE_GC[e]!=null?'<span style="color:var(--warn);font-weight:600">'+PRICE_GC[e]+'</span><span class="price-label"> 0Gc</span>':'';
    const pill='<span class="'+pillCls(e,m)+'" style="cursor:default">'+(m?'<s>'+e+'</s>':e)+' <span class="el-fullname">'+fn+'</span></span>';
    return{pill,qty,qtyCol,unc,gc};
  });
  const pillCol=elData.map((d,i)=>'<div class="el-col-row" data-elidx="'+i+'"><span class="el-pill-wrap" onmouseenter="hlRow(this,'+i+',true)" onmouseleave="hlRow(this,'+i+',false)">'+d.pill+'</span></div>').join('');
  const qtyCol2=elData.map((d,i)=>'<div class="el-col-row el-col-qty" data-elidx="'+i+'" style="color:'+d.qtyCol+'">'+d.qty+'</div>').join('');
  const uncCol=elData.map((d,i)=>'<div class="el-col-row" data-elidx="'+i+'">'+d.unc+'</div>').join('');
  const gcCol=elData.map((d,i)=>'<div class="el-col-row" data-elidx="'+i+'">'+d.gc+'</div>').join('');
  const isNewSite=isNew(s)&&!isFullyMined(s),glowCount=s.allElements.filter(e=>isGlow(e)&&activeRarities.has(getRarity(e))&&getSectorStatus(s,e)==='active').length;
  const hasEpic=s.allElements.some(e=>getRarity(e)==='epic'&&getSectorStatus(s,e)==='active');
  const hasRare=!hasEpic&&s.allElements.some(e=>getRarity(e)==='rare'&&getSectorStatus(s,e)==='active');
  const rc=(isFullyMined(s)?'fully-mined-row':'')+(isNewSite?' new-row':'')+(hasEpic?' row-has-epic':'')+(hasRare?' row-has-rare':'');
  return'<tr class="'+rc+'">'+
    '<td><div class="planet-name">'+s.planetName+'</div><div class="planet-id">ID: '+s.planetId+'</div></td>'+
    '<td><span class="site-name">'+s.siteName+'</span>'+(isNewSite?'<span class="new-badge">NEW ✶</span>':'')+(glowCount>0?'<span class="new-badge" style="background:rgba(255,140,40,.15);border-color:rgba(255,140,40,.5);color:var(--warn)">⚡ '+glowCount+'</span>':'')+'</td>'+
    '<td class="el-col-pill">'+(pillCol||'—')+'</td>'+
    '<td class="el-col-qty-td">'+(qtyCol2||'—')+'</td>'+
    '<td class="el-col-unc-td">'+(uncCol||'—')+'</td>'+
    '<td class="el-col-gc-td">'+(gcCol||'')+'</td>'+
  '</tr>';
}

function renderFlat(rows,tbody,sizeCol){
  const sorted=!currentSort.col?[...rows].sort((a,b)=>{const an=isNew(a)?0:1,bn=isNew(b)?0:1;if(an!==bn)return an-bn;return a.planetName.localeCompare(b.planetName);}):applySort(rows);
  tbody.innerHTML=sorted.map(s=>buildRowHtml(s,sizeCol)).join('');
}

function renderGrouped(rows,tbody,sizeCol){
  const groups={};rows.forEach(s=>{if(!groups[s.planetName])groups[s.planetName]=[];groups[s.planetName].push(s);});
  const sortedPlanets=Object.keys(groups).sort();let html='';
  sortedPlanets.forEach(planet=>{
    const collapsed=collapsedPlanets.has(planet),cnt=groups[planet].length;
    const epicCnt=[...new Set(groups[planet].flatMap(s=>s.allElements.filter(e=>getRarity(e)==='epic'&&getSectorStatus(s,e)==='active')))].length;
    const rareCnt=[...new Set(groups[planet].flatMap(s=>s.allElements.filter(e=>getRarity(e)==='rare'&&getSectorStatus(s,e)==='active')))].length;
    const badges=(epicCnt?'<span class="planet-badge badge-epic" style="margin-left:6px">'+epicCnt+' epic</span>':'')+(rareCnt?'<span class="planet-badge badge-rare" style="margin-left:4px">'+rareCnt+' rare</span>':'');
    const esc=planet.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    html+='<tr class="planet-group-header'+(collapsed?' collapsed':'')+'" onclick="togglePlanetGroup(\''+esc+'\')">';
    html+='<td colspan="6"><span class="pgh-name">\uD83E\uDE90 '+planet+'</span><span class="pgh-meta"> '+cnt+' site'+(cnt!==1?'s':'')+badges+'</span><span class="collapse-icon">\u25BC</span></td></tr>';
    if(!collapsed){html+=applySort(groups[planet]).map(s=>buildRowHtml(s,sizeCol)).join('');}
  });
  tbody.innerHTML=html;
}


function hlRow(el,idx,on){
  // Find the parent tr and highlight all el-col-row divs with matching data-elidx
  const tr=el.closest('tr');
  if(!tr)return;
  tr.querySelectorAll('.el-col-row[data-elidx="'+idx+'"]').forEach(d=>d.classList.toggle('el-row-hover',on));
}

function switchResultTab(name){currentResultTab=name;['tabActive','tabDone'].forEach(id=>document.getElementById(id).classList.remove('active'));document.getElementById(name==='active'?'tabActive':'tabDone').classList.add('active');renderTable();}
function log(boxId,msg,type='info'){const b=document.getElementById(boxId);b.style.display='block';const l=document.createElement('div');l.className='log-line log-'+type;l.textContent='['+new Date().toLocaleTimeString()+'] '+msg;b.appendChild(l);b.scrollTop=b.scrollHeight;}

buildStarfield();
setTheme(store.theme||'deepspace');
loadSharedData();
